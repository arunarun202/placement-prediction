
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Poppins Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap">
  <title>Home</title>
</head>


<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0a0d14;
}

div.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100vh;
}

div.grid {
    margin: 20px auto;
    width: 400px;
    height: 400px;
    display: grid;
    grid-template-columns: 200px 200px;
    grid-row: auto auto;
    grid-column-gap: 5px;
    grid-row-gap: 5px;
}

div.buttoncontainer {
    padding: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
}

a.button {
    width: 190px;
    height: 190px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    cursor: pointer;
}

a.button:hover {
    transition: linear;
    transition-duration: 100ms;
    scale: 1.05;
}

a.instagram {
    background-color: white;
    color: #c43cab;
    border-top-left-radius: 180px;
    transition: linear;
    transition-duration: 100ms;
}

a.twitter {
    background-color: white;
    color: #13b2f7;
    border-top-right-radius: 180px;
    transition: linear;
    transition-duration: 100ms;
}

a.github {
    background-color: white;
    color: #010001;
    border-bottom-left-radius: 180px;
    transition: linear;
    transition-duration: 100ms;
}

a.discord {
    background-color: white;
    color: #8f99ff;
    border-bottom-right-radius: 180px;
    transition: linear;
    transition-duration: 100ms;
}

a.instagram:hover {
    background-color: #c43cab;
    color: white;
}

a.twitter:hover {
    background-color: #13b2f7;
    color: white;
}

a.github:hover {
    background-color: #010001;
    color: white;
}

a.discord:hover {
    background-color: #8f99ff;
    color: white;
}
</style>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <div class="container">

      <div class="grid">
    
        <div class="buttoncontainer">
          <a class="button instagram" target="_blank" href="/">
            <i style="padding-left: 15px; padding-top: 15px;" class="bi bi-house-door"></i>
          </a>
        </div>
    
        <div class="buttoncontainer">
          <a class="button twitter"  href="{% url 'Report' %}">
            <i style="padding-right: 15px; padding-top: 15px;" class="bi bi-exclamation-triangle"></i>
          </a>
        </div>
    
        <div class="buttoncontainer">
          <a class="button github"  href="{% url 'users-profile' %}">
            <i style="padding-left: 15px; padding-bottom: 15px;" class="bi bi-person-circle"></i>
          </a>
        </div>
    
        <div class="buttoncontainer">
          <a class="button discord" href="{% url 'logout_view' %}">
            <i style="padding-right: 15px; padding-bottom: 15px;" class="bi bi-box-arrow-right"></i>
          </a>
        </div>
    
      </div>
    
    </div>
    




    <div class="container p-3 my-3">
        <div class="row">
            <div class="col-md-12">
                {% if messages %}
                    <div class="alert alert-dismissible" role="alert">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    
</body>

</html>
